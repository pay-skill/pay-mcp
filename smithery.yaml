# Smithery registry configuration for @pay-skill/mcp
# https://smithery.ai/server/@pay-skill/mcp

startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      PAYSKILL_SIGNER_KEY:
        type: string
        title: "Keystore Password (or raw key for dev)"
        description: "Not needed if using OS keychain (run 'pay init' first). If ~/.pay/keys/default.enc exists, this is the decryption password. If a 64-char hex string, used as a raw private key (dev/testing only)."
        x-secret: true
      PAY_NETWORK:
        type: string
        title: "Network"
        description: "Target network. Use 'mainnet' for Base mainnet or 'testnet' for Base Sepolia."
        default: "mainnet"
        enum: ["mainnet", "testnet"]
    required: []
  commandFunction: |-
    (config) => ({
      command: "npx",
      args: ["-y", "@pay-skill/mcp"],
      env: {
        ...(config.PAYSKILL_SIGNER_KEY ? { PAYSKILL_SIGNER_KEY: config.PAYSKILL_SIGNER_KEY } : {}),
        PAY_NETWORK: config.PAY_NETWORK || "mainnet",
      },
    })
  exampleConfig:
    PAY_NETWORK: "testnet"
